<!doctype html>
<html lang="en">
  <head>
    <title>Harry Potter</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }

      .rounded-corner {
        border-radius: 5px;
      }
      .card {
        width: 300px;
        height: 400px;
        padding: 1.2em;
        background-color: hsl(260, 32%, 46%);
        display: flex;
        flex-direction: column;
        align-items: center;
        row-gap: 8px;
      }

      .img-container {
        /* width: 250px; */
        overflow: hidden;
        width: 100%;
        height: 80%;
        box-shadow: rgba(14, 30, 37, 0.12) 0px 2px 4px 0px, rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
        /* box-shadow: rgba(77, 59, 114, 0.9) 0px 6px 12px -2px, rgba(77, 59, 114, 0.9) 0px 3px 7px -3px; */
        /* border: 5px solid rgb(77, 59, 114); */
      }
      .card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .details {
        width: 100%;
        height: 20%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .name {
        color:white;
        font-size: 22px;
        font-weight: 600;
      }
      .house-badge {
        padding: 5px;
        width:60px;
        aspect-ratio: 1/1;
        border-radius: 50%;
        background-color: hsla(44, 99%, 53%, 70%);
      }
    </style>
  </head>
  <body>
    <div class="card rounded-corner">
      <div class="img-container rounded-corner">
        <img
          src="https://ik.imagekit.io/hpapi/harry.jpg"
          alt="an image of harry potter"
          class="card-img"
        />
      </div>
      <div class="details">
        <p class="name">Harry Potter</p>
        <img src="/assets/Gryffindor.png" alt="house " class="house-badge" />
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <title>Harry Potter</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div>
      <div class="front-card flex-column-center card rounded-corner">
        <div class="img-container rounded-corner">
          <img
            src="https://ik.imagekit.io/hpapi/harry.jpg"
            alt="an image of harry potter"
            class="card-img"
          />
        </div>
        <div class="details">
          <p class="name">Harry Potter</p>
          <img src="/assets/Gryffindor.png" alt="house " class="house-badge" />
        </div>
      </div>
      <div class="back-card flex-column-center card">
        <table class="more-details">
          <tr>
            <td class="bold">Name</td>
            <td class="right-align">Harry Potter</td>
          </tr>
          <tr>
            <td class="bold">House</td>
            <td class="right-align">Gryffindor</td>
          </tr>
          <tr>
            <td class="bold">Ancestry</td>
            <td class="right-align">Half-blood</td>
          </tr>
          <tr>
            <td class="bold">Alternative Name</td>
            <td class="right-align">The Boy Who Lived</td>
          </tr>
          <tr>
            <td class="bold">DOB</td>
            <td class="right-align">31 July 1980</td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
